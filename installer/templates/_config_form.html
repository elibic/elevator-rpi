<div class="card">
  <h3 class="section-title">Firebase ופרטי מעלית</h3>
  <label>FIREBASE_URL (בסיס, אזור EU)</label>
  <input type="text" id="firebase_url" placeholder="https://...europe-west1.firebasedatabase.app/elevators.json">
  <div class="row">
    <div><label>ELEVATOR_ID (שם המעלית)</label><input type="text" id="elevator_id" placeholder="A"></div>
    <div><label>SECRET_KEY</label><input type="password" id="secret_key"></div>
  </div>
  <div class="row">
    <div><label>SERIAL_PORT</label><input type="text" id="serial_port" value="/dev/ttyUSB0"></div>
    <div><label>BAUDRATE</label><input type="number" id="baudrate" value="115200"></div>
  </div>
</div>

<div class="card">
  <h3 class="section-title">מיפוי תגים</h3>
  <p class="muted">סרוק תג ליד הקורא והזן את שם הקומה. (סריקה עוצרת זמנית את שירות ה-tracker)</p>
  <div id="tags"></div>
  <div class="btn-row">
    <button type="button" onclick="scanTag(this)">📡 סרוק תג</button>
    <button type="button" class="secondary" onclick="addTagRow('','')">+ הוסף ידנית</button>
  </div>
</div>

<div class="card">
  <h3 class="section-title">התראות</h3>
  <div class="toggle"><input type="checkbox" id="notif_enabled"><label style="margin:0">הפעל התראות</label></div>
  <div class="row">
    <div class="toggle"><input type="checkbox" id="ev_enter" checked><label style="margin:0">כניסה לשבת</label></div>
    <div class="toggle"><input type="checkbox" id="ev_exit" checked><label style="margin:0">יציאה משבת</label></div>
    <div class="toggle"><input type="checkbox" id="ev_nomove" checked><label style="margin:0">אין תנועה</label></div>
  </div>

  <h4>אין תנועה (לא כולל לילה)</h4>
  <div class="row">
    <div><label>סף (שעות)</label><input type="number" id="nm_threshold" value="10" step="0.5"></div>
    <div><label>תחילת לילה</label><input type="text" id="nm_night_start" value="23:00"></div>
    <div><label>סוף לילה</label><input type="text" id="nm_night_end" value="06:00"></div>
  </div>

  <h4>Telegram</h4>
  <div class="toggle"><input type="checkbox" id="tg_enabled"><label style="margin:0">הפעל Telegram</label></div>
  <div class="row">
    <div><label>bot_token</label><input type="text" id="tg_token"></div>
    <div><label>chat_id</label><input type="text" id="tg_chat"></div>
  </div>

  <h4>Email (SMTP)</h4>
  <div class="toggle"><input type="checkbox" id="em_enabled"><label style="margin:0">הפעל Email</label></div>
  <div class="row">
    <div><label>SMTP host</label><input type="text" id="em_host" value="smtp.gmail.com"></div>
    <div><label>port</label><input type="number" id="em_port" value="587"></div>
  </div>
  <div class="row">
    <div><label>username</label><input type="text" id="em_user"></div>
    <div><label>password / app-password</label><input type="password" id="em_pass"></div>
  </div>
  <div class="row">
    <div><label>From</label><input type="text" id="em_from"></div>
    <div><label>נמענים (מופרדים בפסיק)</label><input type="text" id="em_to"></div>
  </div>
</div>
