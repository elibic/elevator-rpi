<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הדגמת התקנה — מעלית RFID</title>
<style>
  body { margin:0; background:#0b1220; color:#e2e8f0; font-family:'Segoe UI',Arial,sans-serif;
         display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:24px; }
  h1 { color:#fff; font-size:1.3rem; }
  .caption { height:28px; color:#93c5fd; font-weight:bold; margin-bottom:10px; transition:.3s; }
  .term { width:min(760px,95vw); height:440px; background:#1e1e1e; border-radius:12px;
          box-shadow:0 10px 40px #0008; overflow:hidden; border:1px solid #334155; }
  .bar { background:#2d2d2d; padding:8px 12px; display:flex; gap:8px; align-items:center; }
  .dot { width:12px; height:12px; border-radius:50%; }
  .r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
  .bar .ttl { color:#9ca3af; font-size:.8rem; margin-right:auto; direction:ltr; }
  pre { margin:0; padding:16px; height:380px; overflow-y:auto; direction:ltr; text-align:left;
        font-family:Consolas,monospace; font-size:.92rem; line-height:1.5; white-space:pre-wrap; }
  .prompt { color:#27c93f; } .cmd { color:#e2e8f0; } .ok { color:#6ee7b7; }
  .step { color:#93c5fd; font-weight:bold; } .dim { color:#64748b; } .warn { color:#fcd34d; }
  .link { color:#60a5fa; text-decoration:underline; }
  .cursor { display:inline-block; width:8px; background:#e2e8f0; animation:blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .controls { margin-top:16px; }
  button { background:#2563eb; color:#fff; border:none; padding:10px 22px; border-radius:8px;
           font-size:1rem; cursor:pointer; }
  .hint { color:#94a3b8; font-size:.85rem; margin-top:10px; max-width:760px; text-align:center; }
</style>
</head>
<body>
  <h1>🛗 כך נראית ההתקנה על Pi חדש</h1>
  <div class="caption" id="cap"></div>
  <div class="term">
    <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="ttl">pi@raspberrypi: ~</span></div>
    <pre id="screen"></pre>
  </div>
  <div class="controls"><button id="play" onclick="play()">▶ הפעל הדגמה</button></div>
  <div class="hint">זוהי הדגמה מונפשת של הפקודות (לא הקלטת מסך אמיתית). אפשר להקליט את המסך הזה כדי לקבל קובץ וידאו, או להשתמש בו כהדרכה ויזואלית לצד ההוראות המודפסות.</div>

<script>
const SCRIPT = [
  {cap:'1. מורידים את הקוד (עם הטוקן)'},
  {cmd:'git clone https://<TOKEN>@github.com/elibic/elevator-rpi.git ~/elevator-RFID'},
  {out:"Cloning into '/home/pi/elevator-RFID'...", c:'dim'},
  {out:'Receiving objects: 100% (84/84), done.', c:'dim'},
  {cmd:'cd ~/elevator-RFID'},
  {cap:'2. פקודה אחת שמתקינה הכל'},
  {cmd:'sudo ./setup.sh'},
  {out:'== מושך עדכונים מ-git ==', c:'step'},
  {out:'== מוודא חבילות בסיס (apt) ==', c:'step'},
  {out:'מתקין תיקון דרייבר CP210x…', c:'step'},
  {out:'/dev/ttyUSB0 קיים ✓', c:'ok'},
  {out:'מקים venv ומתקין תלויות פייתון…', c:'step'},
  {cap:'3. עונים על כמה שאלות'},
  {out:'FIREBASE_URL: ', c:'prompt', inline:true},
  {cmd:'https://ramada-elev...firebasedatabase.app/elevators.json', noPrompt:true},
  {out:'ELEVATOR_ID (שם המעלית): ', c:'prompt', inline:true},
  {cmd:'A', noPrompt:true},
  {out:'SECRET_KEY: ', c:'prompt', inline:true},
  {cmd:'••••••••••••', noPrompt:true},
  {cap:'4. ממפים תגים — סורקים ומקלידים קומה'},
  {out:'לסרוק תג חדש? (Y/n): ', c:'prompt', inline:true},
  {cmd:'y', noPrompt:true},
  {out:'מחפש תג… (קרב תג לקורא)', c:'dim'},
  {out:'✓ 00E2004707DC5060270EA801 → קומה 0', c:'ok'},
  {out:'✓ 00E28011704000021CEE45EB → קומה 1', c:'ok'},
  {out:'✓ 00E2004707DCD060270EB001 → קומה 2', c:'ok'},
  {cap:'5. מתחברים ל-Raspberry Pi Connect'},
  {out:'מתקין ומפעיל Raspberry Pi Connect…', c:'step'},
  {out:'פתח ואשר בדפדפן:', c:'warn'},
  {out:'https://connect.raspberrypi.com/verify/ABCD-1234', c:'link'},
  {cap:'✓ סיימנו!'},
  {out:'✓ ההתקנה הושלמה!', c:'ok'},
  {out:'   rfid-tracker: active   shabbat-detector: active', c:'dim'},
];

const screen = document.getElementById('screen');
const cap = document.getElementById('cap');
const btn = document.getElementById('play');
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function typeCmd(text, withPrompt) {
  const line = document.createElement('span');
  if (withPrompt) { const p = document.createElement('span'); p.className='prompt'; p.textContent='pi@raspberrypi:~ $ '; screen.appendChild(p); }
  const c = document.createElement('span'); c.className='cmd'; line.appendChild(c);
  const cur = document.createElement('span'); cur.className='cursor'; cur.textContent=' ';
  screen.appendChild(line); line.appendChild(cur);
  for (const ch of text) { c.textContent += ch; screen.scrollTop = screen.scrollHeight; await sleep(28); }
  cur.remove(); screen.appendChild(document.createTextNode('\n'));
}

async function play() {
  btn.disabled = true; screen.innerHTML = ''; cap.textContent = '';
  for (const item of SCRIPT) {
    if (item.cap !== undefined) { cap.textContent = item.cap; await sleep(500); continue; }
    if (item.cmd !== undefined) { await typeCmd(item.cmd, !item.noPrompt); await sleep(350); continue; }
    if (item.out !== undefined) {
      const s = document.createElement('span'); s.className = item.c || 'cmd'; s.textContent = item.out + (item.inline ? '' : '\n');
      screen.appendChild(s); screen.scrollTop = screen.scrollHeight; await sleep(item.inline ? 250 : 420);
    }
  }
  btn.disabled = false; btn.textContent = '🔁 הצג שוב';
}
window.onload = () => setTimeout(play, 600);
</script>
</body>
</html>
